    post:
      operationId: createPayroll
      tags: [payroll]
      summary: Process payroll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePayrollBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:

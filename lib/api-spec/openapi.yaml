      tags: [transactions]
      summary: List accounting transactions
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [income, expense]
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Transactions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /transactions/balance:
    get:
      operationId: getAccountingBalance
      tags: [transactions]
      summary: Get income/expense balance summary
      responses:
        "200":
          description: Balance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingBalance"

  /reports/sales:
    get:
      operationId: getSalesReport
      tags: [reports]
      summary: Get sales report
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [week, month, quarter, year]
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesReport"

  /reports/inventory:
    get:
      operationId: getInventoryReport
      tags: [reports]
      summary: Get inventory report
      responses:
        "200":
          description: Inventory report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryReport"

  /reports/hr:
    get:
      operationId: getHrReport
      tags: [reports]
      summary: Get HR report
      parameters:
        - in: query
          name: month
          schema:
            type: string
      responses:
        "200":
          description: HR report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HrReport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user, message]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, cashier]
      required: [id, email, name, role]

    DashboardSummary:
      type: object
      properties:
        totalSales:
          type: number
        totalPurchases:
          type: number
        totalCustomers:
          type: integer
        totalProducts:
          type: integer
        totalEmployees:
          type: integer
        lowStockCount:
          type: integer
        monthlyRevenue:
          type: number
        monthlyExpenses:
          type: number
        pendingSalesOrders:
          type: integer
        pendingPurchaseOrders:
          type: integer
      required: [totalSales, totalPurchases, totalCustomers, totalProducts, totalEmployees, lowStockCount, monthlyRevenue, monthlyExpenses, pendingSalesOrders, pendingPurchaseOrders]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        amount:
          type: number
          nullable: true
        createdAt:
          type: string
      required: [id, type, description, createdAt]

    MonthlyData:
      type: object
      properties:
        month:
          type: string
        sales:
          type: number
        purchases:
          type: number
      required: [month, sales, purchases]

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        balance:
          type: number
        createdAt:
          type: string
      required: [id, name, balance, createdAt]

    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
      required: [name]

    SalesOrder:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        customerId:
          type: integer
          nullable: true
        customerName:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, confirmed, delivered, cancelled]
        totalAmount:
          type: number
        discount:
          type: number
        paidAmount:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, orderNumber, status, totalAmount, discount, paidAmount, createdAt]

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        total:
          type: number
      required: [id, productId, productName, quantity, unitPrice, total]

    CreateSalesOrderBody:
      type: object
      properties:
        customerId:
          type: integer
          nullable: true
        customerName:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateOrderItemBody"
        discount:
          type: number
        paidAmount:
          type: number
        notes:
          type: string
          nullable: true
      required: [items, discount, paidAmount]

    CreateOrderItemBody:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: number
        unitPrice:
          type: number
      required: [productId, quantity, unitPrice]

    UpdateSalesOrderBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, delivered, cancelled]
        paidAmount:
          type: number

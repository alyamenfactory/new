    put:
      operationId: updatePurchaseOrder
      tags: [purchases]
      summary: Update purchase order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePurchaseOrderBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
